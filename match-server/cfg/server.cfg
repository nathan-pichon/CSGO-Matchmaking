// =============================================================================
// server.cfg — CS:GO Matchmaking: Competitive Match Server Configuration
//
// Loaded automatically by the dedicated server on every map start.
// Sets the competitive ruleset used for all 5v5 matches.
//
// The mm_match.cfg (generated by entrypoint.sh) is exec'd at the bottom
// to inject per-match ConVars (token, match ID, lobby IP).
// =============================================================================

// -----------------------------------------------------------------------------
// Basic server identity
// -----------------------------------------------------------------------------
hostname        "MM Match Server"
sv_lan          0
sv_cheats       0
sv_pure         1
sv_password     ""          // Server password is set via SRCDS_PW env var at launch

// -----------------------------------------------------------------------------
// Competitive game mode
// -----------------------------------------------------------------------------
game_type       0           // Classic
game_mode       1           // Competitive
mp_maxrounds    30          // Standard 30-round match (first to 16 wins)
mp_match_can_clinch 1       // Match ends early when a team clinches the win
mp_halftime     1           // Teams switch sides at halftime

// -----------------------------------------------------------------------------
// Overtime settings
// -----------------------------------------------------------------------------
mp_overtime_enable      1
mp_overtime_maxrounds   6   // 3 rounds per side in overtime
mp_overtime_startmoney  10000

// -----------------------------------------------------------------------------
// Round timing
// -----------------------------------------------------------------------------
mp_freezetime           15      // Seconds to buy at round start
mp_roundtime            1.92    // 1m 55s round time (matches official MM)
mp_roundtime_defuse     1.92    // Same for bomb defuse mode
mp_buytime              20      // Buy phase duration in seconds
mp_c4timer              40      // Bomb detonation timer (seconds)
mp_round_restart_delay  5       // Delay between round end and new round start

// -----------------------------------------------------------------------------
// Warmup (overridden by warmup.cfg during warmup phase)
// -----------------------------------------------------------------------------
mp_warmuptime       60          // Warmup duration when plugin execs mp_warmup_end
mp_warmup_pausetimer 1          // Prevent warmup timer from counting down automatically

// -----------------------------------------------------------------------------
// Team settings
// -----------------------------------------------------------------------------
mp_autoteambalance  0       // Don't auto-balance — rosters are fixed
mp_limitteams       0       // Don't limit team size differences
mp_friendlyfire     1       // Standard competitive: FF is on
mp_solid_teammates  1       // Players collide with teammates
mp_death_drop_gun   1       // Drop primary weapon on death
mp_death_drop_grenade 2     // Drop all grenades on death
mp_death_drop_defuser 1     // Drop defuser kit on death
mp_defuser_allocation 0     // Players must buy defuser kits

// -----------------------------------------------------------------------------
// Bot settings — no bots in competitive matches
// -----------------------------------------------------------------------------
bot_quota           0
bot_join_after_player 0
bot_quota_mode      "normal"

// -----------------------------------------------------------------------------
// Economy
// -----------------------------------------------------------------------------
mp_startmoney       800     // Standard starting money
mp_maxmoney         16000   // Standard max money
mp_afterroundmoney  0       // No bonus money; handled by round win/loss logic

// -----------------------------------------------------------------------------
// Spectator
// -----------------------------------------------------------------------------
sv_specspeed        1.5     // Spectator movement speed multiplier
sv_specnoclip       1       // Spectators can move through walls

// -----------------------------------------------------------------------------
// Networking / tickrate
// Note: tickrate is set via the -tickrate launch argument (128 by default).
// These rates ensure clients can use the full 128-tick bandwidth.
// -----------------------------------------------------------------------------
sv_maxupdaterate    128
sv_minupdaterate    64
sv_maxcmdrate       128
sv_mincmdrate       64
sv_minrate          128000
sv_maxrate          0       // 0 = unlimited (let sv_maxupdaterate be the bottleneck)

// -----------------------------------------------------------------------------
// Logging — important for stat debugging and anti-cheat audit trails
// -----------------------------------------------------------------------------
log                 on
mp_logdetail        3       // Log all weapon damage and death events
sv_logbans          1       // Log all kick/ban events

// -----------------------------------------------------------------------------
// Match-specific config (injected by entrypoint.sh → exec'd last)
// Sets: mm_match_token, mm_match_id, mm_lobby_ip
// -----------------------------------------------------------------------------
exec mm_match.cfg
