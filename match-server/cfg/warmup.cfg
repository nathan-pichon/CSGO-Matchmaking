// =============================================================================
// warmup.cfg — CS:GO Matchmaking: Warmup Phase Settings
//
// Loaded by csgo_mm_match.sp on OnMapStart() while waiting for all
// whitelisted players to connect. Provides a relaxed warmup environment:
// infinite money, infinite ammo, no round limit.
//
// These settings are overridden when StartMatch() fires
// (exec gamemode_competitive.cfg + mp_warmup_end + mp_restartgame 1).
// =============================================================================

// Extended warmup period — actual end is triggered by the plugin,
// not by the timer, but we keep a large value as a fallback.
mp_warmuptime           300
mp_warmup_pausetimer    1       // Freeze timer so it doesn't count down to 0

// No freeze time during warmup — let players move immediately
mp_freezetime           0

// No bots during warmup
bot_quota               0

// Don't force team balance during warmup
mp_autoteambalance      0
mp_limitteams           0

// Friendly fire off during warmup (no trolling while waiting)
mp_friendlyfire         0

// Very long round time so warmup never ends via timeout
mp_roundtime            60

// Full economy during warmup — everyone can try all weapons
mp_startmoney           16000
mp_maxmoney             16000
mp_afterroundmoney      16000   // Keeps money at max even after dying

// Infinite ammo — let players practice spray patterns etc.
sv_infinite_ammo        1
