// ============================================================
// CS:GO Matchmaking - Lobby Server Configuration
// Applied automatically when the server starts.
// ============================================================

// ─────────────────────────────────────────────────────────────
// Identity
// ─────────────────────────────────────────────────────────────

hostname "CS:GO Competitive Matchmaking - Lobby"

// ─────────────────────────────────────────────────────────────
// Game mode — casual (relaxed, no competitive enforcements)
//   game_type 0 + game_mode 0 = Classic Casual
//   This lets players join freely without rank/team restrictions.
// ─────────────────────────────────────────────────────────────

game_type 0
game_mode 0

// ─────────────────────────────────────────────────────────────
// Team / Player Settings
// ─────────────────────────────────────────────────────────────

// Allow auto-balance and unrestricted team sizes so anyone can
// connect to spectator or either team freely.
mp_autoteambalance 1
mp_limitteams 0
mp_friendlyfire 0

// Allow players to join spectator at will
mp_allowspectators 1

// Disable team-join cooldown so players moving to spectator aren't delayed
mp_team_timeout_time 0

// ─────────────────────────────────────────────────────────────
// Round / Match Timing
// ─────────────────────────────────────────────────────────────

// Short freeze time — lobby is not a real match
mp_freezetime 3

// Long round time — lobby rounds should not pressure players
mp_roundtime 5
mp_roundtime_defuse 5

// Unlimited buy time — players can buy anything in lobby
mp_buytime 9999

// Do not restart the map automatically after a match ends
mp_match_end_restart 0

// No win conditions — lobby never "ends"
mp_maxrounds 0

// ─────────────────────────────────────────────────────────────
// Bots
// ─────────────────────────────────────────────────────────────

// No bots in the lobby by default (set to > 0 if you want filler)
bot_quota 0
bot_quota_mode "normal"
bot_join_after_player 0

// ─────────────────────────────────────────────────────────────
// Networking / Performance
// ─────────────────────────────────────────────────────────────

sv_maxupdaterate 128
sv_minupdaterate 20
sv_maxcmdrate 128
sv_mincmdrate 10
sv_minrate 0
sv_maxrate 0
sv_unlag 1

// ─────────────────────────────────────────────────────────────
// Query / Connection
// ─────────────────────────────────────────────────────────────

sv_max_queries_sec_global 1
sv_max_queries_window 0

// Public server — not LAN only
sv_lan 0

// ─────────────────────────────────────────────────────────────
// Security
// ─────────────────────────────────────────────────────────────

// Cheats disabled
sv_cheats 0

// Pure server — clients must use official content
sv_pure 1

// RCON password — set via command line argument or autoexec.cfg
// NEVER leave this blank on a production server.
rcon_password ""

// ─────────────────────────────────────────────────────────────
// Logging
// ─────────────────────────────────────────────────────────────

log on
mp_logdetail 1
mp_logmessages 1

// ─────────────────────────────────────────────────────────────
// Miscellaneous
// ─────────────────────────────────────────────────────────────

// Do not kick idle players — AFK enforcement is handled by the MM plugin
sv_kick_players_with_cooldown 0

// Allow re-joining after a map change
sv_allowdownload 1
sv_allowupload 1

// Disable death camera transitions to keep lobby snappy
spec_freeze_time 0
spec_freeze_traveltime 0
