// ============================================================
// CS:GO Matchmaking Plugin Configuration
// Located: addons/sourcemod/configs/csgo_matchmaking.cfg
//
// These values are read by the matchmaking plugins at startup.
// Modify and reload the plugin (sm plugins reload csgo_mm_queue)
// for changes to take effect.
// ============================================================

"csgo_matchmaking"
{
    // ──────────────────────────────────────────────────────────
    // Lobby Server Network Info
    // ──────────────────────────────────────────────────────────

    // Public IP address of this lobby server (0.0.0.0 = auto-detect)
    "lobby_ip"              "0.0.0.0"

    // Game port this server listens on
    "lobby_port"            "27015"

    // ──────────────────────────────────────────────────────────
    // Queue Behaviour
    // ──────────────────────────────────────────────────────────

    // Minutes before a waiting queue entry is automatically expired.
    // Keeps the queue clean if a player disconnects without typing !leave.
    "queue_expire_minutes"      "15"

    // Seconds players have to accept the ready check before auto-decline.
    "ready_check_timeout"       "30"

    // Minutes a player is banned from matchmaking after declining a ready check.
    "decline_ban_minutes"       "5"

    // Minutes a queued player can sit in spectator before being auto-dequeued.
    "afk_spec_timeout_minutes"  "5"

    // ──────────────────────────────────────────────────────────
    // Announce / Notification Intervals (seconds)
    // ──────────────────────────────────────────────────────────

    // How often to broadcast the "X players in queue" message to all players.
    "announce_queue_interval"   "60"

    // How often to broadcast the top-3 ELO leaderboard.
    "announce_top_interval"     "300"

    // How often spectating players see a HUD hint about the queue.
    "announce_hud_interval"     "30"

    // ──────────────────────────────────────────────────────────
    // Match Polling
    // ──────────────────────────────────────────────────────────

    // How often (seconds) the plugin polls the DB for match assignment changes.
    // Lower = faster ready-check detection, but more DB load.
    "poll_interval"             "2"

    // ──────────────────────────────────────────────────────────
    // ELO / Rank Settings
    // ──────────────────────────────────────────────────────────

    // Default starting ELO for new players.
    "default_elo"               "1000"

    // Default starting rank tier for new players (5 = Silver Elite Master).
    "default_rank_tier"         "5"
}
